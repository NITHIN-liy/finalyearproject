{% extends "base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="background: var(--primary-50); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-600); margin: 0 auto 1rem; font-size: 1.5rem;">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2 style="margin-bottom: 0.5rem;">Join JusticeAI</h2>
            <p class="text-muted">Start your journey with free legal assistance</p>
        </div>

        <form action="{{ url_for('register') }}" method="post">
            <div class="input-group">
                <label style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Email Address</label>
                <input type="email" name="email" class="input-field" placeholder="name@company.com" required>
            </div>
            <div class="input-group" style="margin-bottom: 2rem;">
                <label style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Create Password</label>
                <input type="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                Register Now
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem;">
            <p class="text-muted">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-600); font-weight: 600; text-decoration: none;">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
