<!DOCTYPE html>
<html>
<head>
<title>Legal AI Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">
    <div class="logo">⚖️ LEGAL AI</div>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/documents">Documents</a>
        <a href="/history">History</a>
    </div>
</div>

<div class="container">
    <div class="input-card">
        <h2>Describe Your Legal Issue</h2>
        
        <div class="chips">
            <span onclick="setProblem('contract review')">Contract issue</span>
            <span onclick="setProblem('property dispute')">Property dispute</span>
            <span onclick="setProblem('employment termination')">Employment problem</span>
            <span onclick="setProblem('legal notice')">Draft notice</span>
        </div>

        <form action="/result" method="POST" enctype="multipart/form-data">
            <div class="input-box">
                <textarea name="problem" id="problem" placeholder="Describe your legal issue in detail... (e.g., contract dispute, property issue, employment termination)" required></textarea>
                <div class="actions">
                    <button type="button" onclick="startVoice()">🎤 Voice</button>
                    <button type="submit">Analyze ➤</button>
                </div>
            </div>
            
            <div class="upload-card">
                <label>📄 Document (TXT):</label>
                <input type="file" name="file" accept=".txt" onchange="this.parentNode.style.background='#22c55e'">
                
                <label>🖼️ Image/Evidence:</label>
                <input type="file" name="image" accept="image/*" onchange="this.parentNode.style.background='#22c55e'">
            </div>
        </form>

        <p class="privacy">🔒 Your data is processed securely, not stored permanently, and uploads are auto-deleted after analysis.</p>
    </div>
</div>

<script>
function setProblem(text) {
    document.getElementById('problem').value = text;
}

function startVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input not supported in this browser.');
        return;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-IN';  // Indian English
    
    rec.onstart = () => console.log('Voice recognition started');
    rec.onresult = (e) => {
        document.getElementById('problem').value = e.results[0][0].transcript;
    };
    rec.onerror = (e) => console.error('Voice error:', e.error);
    rec.onend = () => console.log('Voice recognition ended');
    
    rec.start();
}
</script>

</body>
</html>
